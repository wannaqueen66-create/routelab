services:
  upload-perms:
    image: alpine:3.20
    command: >-
      sh -lc "mkdir -p /data/uploads && chown -R 1001:65533 /data/uploads && chmod -R u+rwX,g+rX /data/uploads"
    volumes:
      - api_uploads:/data/uploads
    restart: "no"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-routelab}
      POSTGRES_USER: ${POSTGRES_USER:-routelab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8 --lc-collate=C.UTF-8 --lc-ctype=C.UTF-8"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  api:
    build:
      context: ./server
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      upload-perms:
        condition: service_completed_successfully
    environment:
      PORT: ${API_PORT:-8080}
      STORAGE_LOCAL_PATH: /data/uploads
      STORAGE_BASE_URL: ${STORAGE_BASE_URL:-https://routelab.qzz.io/static/uploads}
      BACKUP_STORAGE_PATH: /data/backups
      DATABASE_URL: postgres://${POSTGRES_USER:-routelab}:${POSTGRES_PASSWORD:?set in .env}@db:5432/${POSTGRES_DB:-routelab}
    volumes:
      - api_uploads:/data/uploads
      - api_backups:/data/backups
      - ./scripts:/scripts:ro
    expose:
      - "8080"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      api:
        condition: service_started
    ports:
      - "${NGINX_PORT_HTTP:-80}:80"
      - "${NGINX_PORT_HTTPS:-443}:443"
    volumes:
      - api_uploads:/data/uploads:ro
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/certs:/etc/ssl/origin:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

volumes:
  db_data:
  api_uploads:
  api_backups:
