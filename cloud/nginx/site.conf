# ---------- 全局：避免 types 哈希过小导致启动失败 ----------
types_hash_max_size    1024;
types_hash_bucket_size 128;

# 上游 API（与 docker-compose 服务端端口一致）
upstream api_upstream {
    server api:8080;
    keepalive 32;
}

# ---------- HTTP：健康检查直接 200，其余跳转到 HTTPS ----------
server {
    listen 80 default_server;
    server_name _;  # 匹配任意 Host（如 127.0.0.1）
    charset utf-8;

    # 健康检查（本机或负载均衡探针）
    location = /healthz {
        add_header Content-Type "text/plain; charset=utf-8";
        return 200 "ok
";
    }

    # 其余统一跳转到 HTTPS
    return 301 https://$host$request_uri;
}

# ---------- HTTPS：正式服务 ----------
server {
    listen 443 ssl http2 default_server;
    server_name _;  # 匹配任意 Host（如 127.0.0.1）
    charset utf-8;

    # TLS（Cloudflare Origin 证书路径，按你的挂载调整）
    ssl_certificate     /etc/ssl/origin/cf-origin.pem;
    ssl_certificate_key /etc/ssl/origin/cf-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20m;

    # 静态上传直出（如不需要可删除）
    location /static/uploads/ {
        alias /data/uploads/;
        autoindex off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 健康检查（HTTPS）
    location = /healthz {
        add_header Content-Type "text/plain; charset=utf-8";
        return 200 "ok
";
    }

    # API 反向代理
    location /api/ {
        proxy_pass         http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # 前端站点（如无前端可删除）
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
